name: 📰 Generar Newsletter Diaria

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

jobs:
  generar-newsletter:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: pip install requests

      - name: 🔍 Debug secrets
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          echo "GROQ key length: ${#GROQ_API_KEY}"
          echo "TAVILY key length: ${#TAVILY_API_KEY}"

      - name: 🤖 Generar newsletter
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python scripts/generar_newsletter.py

      - name: 💾 Commit y push
        run: |
          git config user.name "El Diario de Santiago Bot"
          git config user.email "actions@github.com"
          git add ediciones/
          git diff --staged --quiet || git commit -m "📰 Edición $(date +'%Y-%m-%d')"
          git push
